<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>InsightSwarm Collector</title>
    <style>
      body {
        min-width: 260px;
        font-family: system-ui, sans-serif;
        margin: 12px;
      }
      label,
      input,
      button {
        display: block;
        width: 100%;
        box-sizing: border-box;
      }
      input {
        margin: 6px 0 10px;
      }
      button {
        padding: 8px;
      }
      #status {
        margin-top: 10px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <label for="port">Local collector port</label>
    <input id="port" type="number" min="1" max="65535" value="8765">
    <button id="send">Send current page</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
